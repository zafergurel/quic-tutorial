<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QUIC Protocol — Interactive Tutorial</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #020817; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #020c1b; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

const sections = [
  {
    id: "intro",
    title: "What is QUIC?",
    icon: "⚡",
    content: `QUIC (Quick UDP Internet Connections) is a modern transport layer network protocol developed by Google and standardized by the IETF as RFC 9000 in 2021. It's the foundation of HTTP/3 — the latest version of the web's core protocol.

QUIC runs over UDP instead of TCP, and bakes in features like TLS 1.3 encryption, multiplexing, and connection migration directly into the protocol itself.`,
    highlight: "QUIC = UDP + TLS 1.3 + Multiplexing + Flow Control — all in one"
  },
  {
    id: "why",
    title: "Why QUIC? The TCP Problem",
    icon: "🔍",
    content: `TCP has served the internet well for decades, but it has fundamental limitations in today's multi-path, mobile, lossy-network world:

• Head-of-Line (HoL) Blocking: TCP delivers bytes in strict order. One lost packet blocks all subsequent data — even data for completely unrelated requests.

• Slow Handshake: TCP requires a 1-RTT (round-trip time) handshake, and then TLS adds another 1–2 RTTs. That's 2–3 RTTs before the first byte of data flows.

• No Connection Migration: If your IP changes (e.g., switching from WiFi to 4G), your TCP connection dies immediately — the OS must establish a new one.

• Ossification: TCP is implemented in OS kernels, making it extremely hard to update or evolve.`,
    highlight: "TCP's biggest enemy: Head-of-Line Blocking kills performance at scale"
  },
  {
    id: "handshake",
    title: "The QUIC Handshake",
    icon: "🤝",
    content: `QUIC dramatically reduces connection setup time:

Initial Connection (1-RTT):
  → Client sends Initial packet (Client Hello)
  ← Server responds with certificates + Server Hello
  → Client sends Finished + first data
  ← Server sends first response data

0-RTT Resumption:
If the client has talked to this server before, it stores a session ticket. On the next connection, it can send application data immediately — zero round trips before data starts flowing.

Compare to TCP + TLS 1.3:
  TCP SYN → TCP SYN-ACK → TCP ACK   (1 RTT for TCP)
  TLS Client Hello → Server Hello   (1 more RTT)
  = 2 RTTs minimum, often more with older TLS versions.`,
    highlight: "QUIC: 1-RTT first connect, 0-RTT on resume. TCP+TLS: 2-3 RTTs always."
  },
  {
    id: "streams",
    title: "Streams & Multiplexing",
    icon: "🌊",
    content: `QUIC introduces first-class streams at the transport layer. A single QUIC connection can carry many independent, bidirectional or unidirectional streams simultaneously.

Each stream has its own flow control and ordering guarantees, but streams are independent of each other. This eliminates Head-of-Line Blocking:

Scenario: Downloading 3 files (Streams 1, 2, 3)
  TCP:   Packet lost in file 1? ALL files stall ❌
  QUIC:  Packet lost in stream 1? Only stream 1 stalls, 2 & 3 continue ✅

Stream IDs are 62-bit integers. Client-initiated bidirectional streams: 0, 4, 8...  Server-initiated: 1, 5, 9...  Client-initiated unidirectional: 2, 6, 10...

A browser loading a page uses dozens of QUIC streams: HTML, CSS, JS, images — each independent, no blocking.`,
    highlight: "One QUIC connection = many independent streams. Loss in one never blocks others."
  },
  {
    id: "migration",
    title: "Connection Migration",
    icon: "📡",
    content: `TCP connections are identified by a 4-tuple: (src IP, src port, dst IP, dst port). Change any element — the connection is dead.

QUIC connections are identified by a Connection ID (CID) — an arbitrary byte string chosen by the endpoints. The network path is irrelevant to the connection identity.

Real-world impact:
  • You're on a video call using QUIC. You walk out of WiFi range and your phone switches to LTE — the call continues seamlessly, not even a hiccup.
  • TCP: The OS kills the socket, your app must reconnect, the server re-authenticates you.

QUIC also supports multiple CIDs simultaneously, which enables load balancers to route packets without reading encrypted headers and helps protect against traffic correlation attacks.`,
    highlight: "QUIC survives IP changes. Walk from WiFi to 4G mid-transfer — nothing breaks."
  },
  {
    id: "security",
    title: "Security by Design",
    icon: "🔒",
    content: `In TCP, encryption (TLS) is a separate layer bolted on top. In QUIC, encryption is mandatory and integral — you cannot have an unencrypted QUIC connection.

What's encrypted in QUIC:
  ✅ All application data (like TLS over TCP)
  ✅ Stream headers and metadata
  ✅ Most packet headers (including packet numbers)
  ✅ Connection IDs (after initial handshake)

What's NOT encrypted (must be visible for routing):
  ❌ UDP headers (IP + port)
  ❌ QUIC packet type (Initial, Handshake, 1-RTT)
  ❌ Connection ID (in some phases)

QUIC also has built-in protection against amplification attacks — the server won't send more than 3× the data it has received from an unverified client.

TLS 1.3 is the only supported TLS version in QUIC. No TLS 1.0, 1.1, or 1.2 negotiation possible.`,
    highlight: "Encryption is not optional in QUIC. It's the protocol. No cleartext, ever."
  },
  {
    id: "http3",
    title: "QUIC & HTTP/3",
    icon: "🌐",
    content: `HTTP/3 is simply HTTP semantics running over QUIC instead of TCP. The HTTP methods, status codes, headers — all the same. Just the transport changes.

HTTP/2 vs HTTP/3:
  HTTP/2: Multiplexing over TCP → still has HoL blocking at TCP layer
  HTTP/3: Multiplexing over QUIC streams → true independence

The mapping is direct:
  Each HTTP request/response pair = one or two QUIC streams
  PUSH_PROMISE = server-initiated QUIC stream
  HEADERS + DATA = QUIC STREAM frames

QPACK (HTTP/3's header compression) is the successor to HPACK (HTTP/2). It was redesigned to avoid HoL blocking in header compression itself — a subtle but important fix.

Adoption: As of 2024, ~30% of websites support HTTP/3. Chrome, Firefox, Safari, curl, nginx, and Cloudflare all support it.`,
    highlight: "HTTP/3 = HTTP/2 semantics + QUIC transport. Same API, radically better transport."
  },
  {
    id: "packets",
    title: "Packet Types & Wire Format",
    icon: "📦",
    content: `QUIC has two categories of packets:

Long Header Packets (connection establishment):
  • Initial — first packets, contain crypto handshake
  • 0-RTT — early data from client
  • Handshake — later crypto handshake messages
  • Retry — server challenges client address

Short Header Packets (after handshake):
  • 1-RTT — all application data, minimal header overhead

Key frame types carried inside packets:
  STREAM     — carries stream data
  ACK        — acknowledges received packets
  CRYPTO     — TLS handshake messages
  PADDING    — fills space (anti-amplification)
  CONNECTION_CLOSE — graceful/abrupt shutdown
  NEW_CONNECTION_ID — for migration
  PATH_CHALLENGE / PATH_RESPONSE — path validation

Packet numbers are per-packet-space (Initial, Handshake, 1-RTT) and never reused — enabling precise loss detection.`,
    highlight: "QUIC's packet/frame duality lets it evolve: new frame types without breaking old clients."
  },
  {
    id: "congestion",
    title: "Loss Detection & Congestion",
    icon: "📊",
    content: `QUIC reimplements congestion control and loss detection — but does so in user space, making it vastly easier to update and experiment with.

Key improvements over TCP:

Unambiguous ACKs: TCP reuses sequence numbers on retransmission, causing the "retransmission ambiguity" problem (was an ACK for original or retransmit?). QUIC uses unique packet numbers — ACKs are always unambiguous.

Selective ACK (always on): TCP's SACK is optional and complex. QUIC ACK frames always carry detailed range information, enabling precise loss detection.

ACK Delay: QUIC ACK frames carry the receiver's processing delay, enabling more accurate RTT estimates.

Default algorithms:
  • Loss detection: RACK (Recent ACKnowledgment) algorithm
  • Congestion control: NewReno by default, but CUBIC, BBR easily pluggable — in user space!

This pluggability is huge: Google uses BBRv2 in production for QUIC, delivering significant throughput gains on lossy networks.`,
    highlight: "QUIC's congestion control runs in user space — update it like any library, no kernel patch."
  }
];

const CompareRow = ({ label, tcp, quic }) => (
  React.createElement('div', {
    style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "0", borderBottom: "1px solid #1e293b" }
  },
    React.createElement('div', { style: { padding: "10px 14px", color: "#94a3b8", fontSize: "0.82rem", fontFamily: "monospace", borderRight: "1px solid #1e293b" } }, label),
    React.createElement('div', { style: { padding: "10px 14px", color: "#f87171", fontSize: "0.82rem", borderRight: "1px solid #1e293b" } }, tcp),
    React.createElement('div', { style: { padding: "10px 14px", color: "#4ade80", fontSize: "0.82rem" } }, quic)
  )
);

function QUICTutorial() {
  const [active, setActive] = React.useState("intro");
  const current = sections.find(s => s.id === active);
  const currentIdx = sections.findIndex(s => s.id === active);

  return (
    <div style={{
      minHeight: "100vh",
      background: "#020817",
      color: "#e2e8f0",
      fontFamily: "'Georgia', serif",
      display: "flex",
      flexDirection: "column"
    }}>
      <div style={{
        borderBottom: "1px solid #0f172a",
        background: "linear-gradient(135deg, #020817 0%, #0a1628 100%)",
        padding: "28px 32px 24px",
      }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: "14px", marginBottom: "6px" }}>
          <span style={{ fontSize: "2rem", fontWeight: "900", letterSpacing: "-2px", color: "#38bdf8", fontFamily: "monospace" }}>QUIC</span>
          <span style={{ fontSize: "0.75rem", color: "#475569", letterSpacing: "3px", textTransform: "uppercase", fontFamily: "monospace" }}>RFC 9000 · HTTP/3 Transport</span>
        </div>
        <p style={{ margin: 0, color: "#64748b", fontSize: "0.88rem", fontFamily: "monospace" }}>
          A complete protocol tutorial — from handshake to streams to migration
        </p>
      </div>

      <div style={{ display: "flex", flex: 1, minHeight: "calc(100vh - 101px)" }}>
        {/* Sidebar */}
        <div style={{
          width: "220px",
          minWidth: "220px",
          borderRight: "1px solid #0f172a",
          overflowY: "auto",
          background: "#020c1b",
          padding: "12px 0"
        }}>
          {sections.map((s, i) => (
            <button
              key={s.id}
              onClick={() => setActive(s.id)}
              style={{
                display: "flex",
                alignItems: "center",
                gap: "10px",
                width: "100%",
                padding: "10px 16px",
                background: active === s.id ? "rgba(56,189,248,0.08)" : "transparent",
                border: "none",
                borderLeft: active === s.id ? "2px solid #38bdf8" : "2px solid transparent",
                cursor: "pointer",
                textAlign: "left",
              }}
            >
              <span style={{ fontSize: "1rem" }}>{s.icon}</span>
              <div>
                <div style={{ fontSize: "0.72rem", color: "#334155", fontFamily: "monospace", marginBottom: "1px" }}>{String(i + 1).padStart(2, '0')}</div>
                <div style={{ fontSize: "0.8rem", color: active === s.id ? "#38bdf8" : "#64748b", fontFamily: "'Georgia', serif", lineHeight: 1.2 }}>{s.title}</div>
              </div>
            </button>
          ))}
        </div>

        {/* Main */}
        <div style={{ flex: 1, overflowY: "auto", padding: "36px 40px" }}>
          <div style={{ maxWidth: "700px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "8px" }}>
              <span style={{ fontSize: "1.8rem" }}>{current.icon}</span>
              <h2 style={{ margin: 0, fontSize: "1.6rem", fontWeight: "700", color: "#f1f5f9", letterSpacing: "-0.5px" }}>{current.title}</h2>
            </div>
            <div style={{ width: "40px", height: "2px", background: "linear-gradient(90deg, #38bdf8, transparent)", marginBottom: "28px" }} />

            <div style={{ fontSize: "0.9rem", lineHeight: "1.85", color: "#94a3b8", marginBottom: "28px" }}>
              {current.content.split('\n').map((line, i) => {
                if (line.includes('✅')) return <div key={i} style={{ padding: "3px 0 3px 16px", color: "#4ade80" }}>{line}</div>;
                if (line.includes('❌')) return <div key={i} style={{ padding: "3px 0 3px 16px", color: "#f87171" }}>{line}</div>;
                if (line.trim().startsWith('→')) return <div key={i} style={{ padding: "3px 0 3px 16px", color: "#38bdf8", fontFamily: "monospace", fontSize: "0.83rem" }}>{line}</div>;
                if (line.trim().startsWith('←')) return <div key={i} style={{ padding: "3px 0 3px 16px", color: "#a78bfa", fontFamily: "monospace", fontSize: "0.83rem" }}>{line}</div>;
                if (line.startsWith('  •')) return <div key={i} style={{ padding: "3px 0 3px 16px" }}>{line}</div>;
                if (!line.trim()) return <br key={i} />;
                return <div key={i}>{line}</div>;
              })}
            </div>

            <div style={{
              background: "rgba(56,189,248,0.06)",
              border: "1px solid rgba(56,189,248,0.2)",
              borderLeft: "3px solid #38bdf8",
              padding: "14px 18px",
              borderRadius: "0 6px 6px 0",
              marginBottom: "36px"
            }}>
              <div style={{ fontSize: "0.7rem", color: "#38bdf8", fontFamily: "monospace", letterSpacing: "2px", marginBottom: "5px" }}>KEY INSIGHT</div>
              <div style={{ fontSize: "0.87rem", color: "#bae6fd", fontStyle: "italic" }}>{current.highlight}</div>
            </div>

            {(active === "intro" || active === "why") && (
              <div style={{ marginBottom: "36px" }}>
                <div style={{ fontSize: "0.7rem", color: "#475569", fontFamily: "monospace", letterSpacing: "2px", marginBottom: "12px" }}>TCP VS QUIC AT A GLANCE</div>
                <div style={{ border: "1px solid #1e293b", borderRadius: "6px", overflow: "hidden" }}>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", background: "#0a1628", borderBottom: "1px solid #1e293b" }}>
                    <div style={{ padding: "10px 14px", color: "#475569", fontFamily: "monospace", fontSize: "0.72rem", letterSpacing: "1px", borderRight: "1px solid #1e293b" }}>FEATURE</div>
                    <div style={{ padding: "10px 14px", color: "#475569", fontFamily: "monospace", fontSize: "0.72rem", letterSpacing: "1px", borderRight: "1px solid #1e293b" }}>TCP + TLS</div>
                    <div style={{ padding: "10px 14px", color: "#475569", fontFamily: "monospace", fontSize: "0.72rem", letterSpacing: "1px" }}>QUIC</div>
                  </div>
                  <CompareRow label="Transport" tcp="TCP (stream)" quic="UDP (datagrams)" />
                  <CompareRow label="Encryption" tcp="Optional (TLS bolted on)" quic="Mandatory (TLS 1.3 built-in)" />
                  <CompareRow label="Handshake" tcp="2–3 RTTs" quic="1 RTT (0-RTT possible)" />
                  <CompareRow label="HoL Blocking" tcp="Yes (TCP level)" quic="No (independent streams)" />
                  <CompareRow label="Multiplexing" tcp="HTTP/2 only (app layer)" quic="Native (transport layer)" />
                  <CompareRow label="Connection migration" tcp="Not supported" quic="Native (Connection ID)" />
                  <CompareRow label="Evolveability" tcp="Kernel-locked" quic="User space" />
                </div>
              </div>
            )}

            {active === "handshake" && (
              <div style={{ marginBottom: "36px" }}>
                <div style={{ fontSize: "0.7rem", color: "#475569", fontFamily: "monospace", letterSpacing: "2px", marginBottom: "12px" }}>HANDSHAKE TIMELINE</div>
                <div style={{ background: "#050f1e", border: "1px solid #1e293b", borderRadius: "6px", padding: "20px 24px", fontFamily: "monospace", fontSize: "0.8rem" }}>
                  {[
                    { time: "t=0", dir: "→", label: "Initial (ClientHello + CRYPTO)", color: "#38bdf8" },
                    { time: "t=1RTT", dir: "←", label: "Initial + Handshake (ServerHello, cert, Finished)", color: "#a78bfa" },
                    { time: "t=1RTT", dir: "→", label: "Handshake (Finished) + 1-RTT DATA ✅", color: "#4ade80" },
                    { time: "t=1.5RTT", dir: "←", label: "1-RTT DATA (response) ✅", color: "#4ade80" },
                  ].map((row, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "10px" }}>
                      <span style={{ color: "#334155", minWidth: "56px" }}>{row.time}</span>
                      <span style={{ color: row.dir === "→" ? "#38bdf8" : "#a78bfa", fontSize: "1rem" }}>{row.dir}</span>
                      <span style={{ color: row.color }}>{row.label}</span>
                    </div>
                  ))}
                  <div style={{ marginTop: "14px", paddingTop: "14px", borderTop: "1px solid #1e293b", color: "#334155" }}>
                    0-RTT (session resumption): Client sends DATA at t=0, before any server response
                  </div>
                </div>
              </div>
            )}

            <div style={{ display: "flex", justifyContent: "space-between", paddingTop: "20px", borderTop: "1px solid #0f172a" }}>
              {currentIdx > 0 ? (
                <button onClick={() => setActive(sections[currentIdx - 1].id)}
                  style={{ background: "none", border: "1px solid #1e293b", color: "#64748b", padding: "8px 16px", cursor: "pointer", borderRadius: "4px", fontFamily: "monospace", fontSize: "0.78rem" }}>
                  ← prev
                </button>
              ) : <div />}
              {currentIdx < sections.length - 1 ? (
                <button onClick={() => setActive(sections[currentIdx + 1].id)}
                  style={{ background: "rgba(56,189,248,0.08)", border: "1px solid rgba(56,189,248,0.3)", color: "#38bdf8", padding: "8px 16px", cursor: "pointer", borderRadius: "4px", fontFamily: "monospace", fontSize: "0.78rem" }}>
                  next →
                </button>
              ) : (
                <div style={{ color: "#334155", fontFamily: "monospace", fontSize: "0.78rem", alignSelf: "center" }}>✓ tutorial complete</div>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<QUICTutorial />);
  </script>
</body>
</html>
